services:
  test-db:
    image: postgres:17
    container_name: syncup-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: syncup_test
    ports:
      - "5433:5432"     # host 5433 -> container 5432
    tmpfs:
      - /var/lib/postgresql/data    # in-memory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d syncup_test"]
      interval: 2s
      timeout: 3s
      retries: 10